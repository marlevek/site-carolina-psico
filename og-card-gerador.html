<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador OG Card — Carolina Cunha Levek</title>
  <link rel="manifest" href="/site.webmanifest">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon-48x48.png" sizes="48x48">
  <link rel="icon" type="image/png" href="/favicon-192x192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ccc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: "DM Sans", sans-serif;
    }

    /* Card exato: 1200x630px */
    .og-card {
      width: 1200px;
      height: 630px;
      background: #F8F4FB;
      display: flex;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    /* Gradientes de fundo */
    .og-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 80% 20%, rgba(119, 84, 179, 0.18), transparent 45%),
        radial-gradient(circle at 20% 80%, rgba(216, 198, 234, 0.34), transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(104, 69, 168, 0.12), transparent 35%);
      pointer-events: none;
    }

    /* Lado esquerdo — foto */
    .og-photo-side {
      width: 420px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .og-photo-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* Overlay gradiente sobre a foto */
    .og-photo-side::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, transparent 60%, #F8F4FB 100%);
    }

    /* Lado direito — texto */
    .og-text-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 56px 64px 56px 40px;
      position: relative;
      z-index: 1;
      gap: 0;
    }

    .og-eyebrow {
      font-family: "DM Sans", sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #6845A8;
      margin-bottom: 16px;
    }

    .og-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 58px;
      font-weight: 600;
      line-height: 1.0;
      color: #2A2230;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .og-name em {
      font-style: italic;
      color: #7754B3;
    }

    .og-role {
      font-family: "DM Sans", sans-serif;
      font-size: 18px;
      font-weight: 400;
      color: rgba(42, 34, 48, 0.65);
      margin-bottom: 28px;
      letter-spacing: 0.01em;
    }

    .og-divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(to right, #6845A8, #7754B3);
      border-radius: 2px;
      margin-bottom: 28px;
    }

    .og-tagline {
      font-family: "Cormorant Garamond", serif;
      font-size: 22px;
      font-style: italic;
      color: #2A2230;
      line-height: 1.45;
      margin-bottom: 32px;
      max-width: 380px;
    }

    .og-details {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .og-detail {
      font-size: 13.5px;
      color: rgba(42, 34, 48, 0.6);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .og-detail::before {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #D8C6EA;
      flex-shrink: 0;
    }

    .og-url {
      position: absolute;
      bottom: 36px;
      right: 64px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(42, 34, 48, 0.4);
      letter-spacing: 0.04em;
    }

    /* Instrução fora do card */
    .instrucao {
      display: none;
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-family: sans-serif;
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 20px;
      white-space: nowrap;
      z-index: 100;
    }
  </style>
</head>
