<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>OG Card - Carolina Cunha Levek</title>
  <link rel="manifest" href="/site.webmanifest">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon-48x48.png" sizes="48x48">
  <link rel="icon" type="image/png" href="/favicon-192x192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 1200px;
      height: 630px;
      margin: 0;
      overflow: hidden;
      background: #F8F4FB;
    }

    .card {
      position: fixed;
      inset: 0;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: "DM Sans", sans-serif;
      color: #2A2230;
    }

    .base {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .copy {
      position: absolute;
      left: 118px;
      top: 128px;
      width: 590px;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: #6845A8;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 76px;
      font-weight: 600;
      line-height: 0.92;
      letter-spacing: 0;
    }

    h1 span {
      display: block;
      color: #7754B3;
      font-style: italic;
    }

    .role {
      margin: 18px 0 26px;
      color: rgba(42, 34, 48, 0.68);
      font-size: 24px;
      line-height: 1.35;
    }

    .divider {
      width: 84px;
      height: 3px;
      margin-bottom: 26px;
      border-radius: 99px;
      background: #7754B3;
    }

    .tagline {
      max-width: 500px;
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 32px;
      font-style: italic;
      line-height: 1.25;
    }

  </style>
</head>
<body>
  <main class="card">
    <img class="base" src="assets/branding/og-carolina-cunha-levek.png" alt="">
    <section class="copy" aria-label="Texto do card de compartilhamento">
      <p class="eyebrow">Psicóloga · CRP 08/48278</p>
      <h1>Carolina <span>Cunha Levek</span></h1>
      <p class="role">Atendimento psicológico online e presencial</p>
      <div class="divider" aria-hidden="true"></div>
      <p class="tagline">Relações mais conscientes, leves e autênticas.</p>
    </section>
  </main>
</body>
</html>
